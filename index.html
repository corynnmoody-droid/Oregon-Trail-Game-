<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oregon Trail — Colony Survival</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: #f5f0e8;
    color: #2a1f0e;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }

  #game { width: 100%; max-width: 720px; }

  .game-header {
    text-align: center;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 2px solid #c9b99a;
  }
  .game-header h1 { font-size: 28px; font-weight: 700; color: #3d2b0e; letter-spacing: 0.02em; margin-bottom: 4px; }
  .game-header .subtitle { font-size: 13px; color: #7a6040; font-style: italic; }

  .progress-wrap { margin-bottom: 1.25rem; }
  .progress-label { font-size: 11px; color: #7a6040; text-align: center; font-family: Arial, sans-serif; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
  .progress-track { height: 6px; background: #d4c5a9; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: #5a7a35; border-radius: 3px; transition: width 0.5s ease; }

  .warning-banner {
    background: #f5e0b0; color: #7a4800;
    border: 1px solid #d4b060; border-radius: 8px;
    padding: 8px 14px; font-size: 13px; font-weight: 600;
    text-align: center; margin-bottom: 1rem; font-family: Arial, sans-serif;
  }
  .danger-banner {
    background: #f5d0d0; color: #8a2020;
    border: 1px solid #d48080; border-radius: 8px;
    padding: 8px 14px; font-size: 13px; font-weight: 600;
    text-align: center; margin-bottom: 1rem; font-family: Arial, sans-serif;
  }

  .stats-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
  .stat-card {
    background: #fffdf7; border: 1px solid #c9b99a;
    border-radius: 10px; padding: 12px 14px; text-align: center;
  }
  .stat-label { font-size: 11px; color: #7a6040; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; font-family: Arial, sans-serif; }
  .stat-value { font-size: 26px; font-weight: 700; color: #2a1f0e; line-height: 1; }
  .stat-value.danger { color: #b83030; }
  .stat-value.warn   { color: #a06010; }
  .stat-value.ok     { color: #2a1f0e; }
  .stat-bar-fill { height: 5px; border-radius: 3px; background: #e0d5c0; margin-top: 8px; overflow: hidden; }
  .stat-bar-inner { height: 100%; border-radius: 3px; transition: width 0.5s ease, background 0.5s ease; }

  .phase-banner { text-align: center; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #7a6040; margin-bottom: 6px; font-family: Arial, sans-serif; }
  .scenario-title { font-size: 22px; font-weight: 700; color: #3d2b0e; text-align: center; margin-bottom: 0.6rem; line-height: 1.3; }
  .scenario-desc { font-size: 14px; color: #4a3820; line-height: 1.7; text-align: center; margin-bottom: 1.5rem; }

  .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.25rem; }
  .choice-btn {
    background: #fffdf7; border: 1.5px solid #c9b99a; border-radius: 12px;
    padding: 16px 18px; cursor: pointer; text-align: left;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    font-family: Georgia, serif;
  }
  .choice-btn:hover { background: #f5efe0; border-color: #a08040; transform: translateY(-1px); }
  .choice-btn:active { transform: translateY(0); }
  .choice-title { font-size: 14px; font-weight: 700; color: #3d2b0e; margin-bottom: 7px; line-height: 1.4; }
  .choice-desc { font-size: 12px; color: #6a5030; line-height: 1.5; margin-bottom: 10px; font-style: italic; }
  .effect-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .effect-tag { font-size: 11px; padding: 2px 8px; border-radius: 100px; font-weight: 700; font-family: Arial, sans-serif; }
  .effect-tag.pos { background: #ddeec0; color: #3a5a18; }
  .effect-tag.neg { background: #f5d0d0; color: #8a2020; }
  .effect-tag.neu { background: #e8e0d0; color: #6a5030; }

  .result-box {
    background: #fffdf7; border: 1.5px solid #c9b99a;
    border-left: 5px solid #b07020; border-radius: 10px;
    padding: 1.1rem 1.25rem; margin-bottom: 1.1rem;
  }
  .result-chosen { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #7a6040; margin-bottom: 5px; font-family: Arial, sans-serif; }
  .result-title { font-size: 15px; font-weight: 700; color: #3d2b0e; margin-bottom: 8px; }
  .result-desc { font-size: 14px; color: #4a3820; line-height: 1.65; }
  .delta-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .delta-tag { font-size: 12px; font-weight: 700; padding: 3px 11px; border-radius: 100px; font-family: Arial, sans-serif; }
  .delta-tag.pos { background: #ddeec0; color: #3a5a18; }
  .delta-tag.neg { background: #f5d0d0; color: #8a2020; }
  .delta-tag.zero { background: #e8e0d0; color: #6a5030; }

  .next-btn {
    display: block; width: 100%; padding: 13px;
    background: #3d2b0e; color: #f5efe0; border: none;
    border-radius: 10px; font-size: 15px; font-weight: 700;
    cursor: pointer; text-align: center; font-family: Georgia, serif;
    letter-spacing: 0.02em; transition: background 0.15s;
  }
  .next-btn:hover { background: #5a4020; }

  .divider { border: none; border-top: 1px solid #c9b99a; margin: 1.25rem 0; }

  .end-card { text-align: center; padding: 1rem 0 2rem; }
  .end-result-banner {
    font-size: 13px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; padding: 6px 18px; border-radius: 100px;
    display: inline-block; margin-bottom: 1rem; font-family: Arial, sans-serif;
  }
  .end-result-banner.survived { background: #ddeec0; color: #3a5a18; }
  .end-result-banner.failed   { background: #f5d0d0; color: #8a2020; }
  .end-title { font-size: 26px; font-weight: 700; color: #3d2b0e; margin-bottom: 0.6rem; }
  .end-sub { font-size: 14px; color: #4a3820; margin-bottom: 1.5rem; line-height: 1.7; max-width: 520px; margin-left: auto; margin-right: auto; }
  .final-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
  .reflection-box { background: #fffdf7; border: 1px solid #c9b99a; border-radius: 10px; padding: 1.1rem 1.4rem; text-align: left; margin-bottom: 1.5rem; }
  .reflection-box h3 { font-size: 14px; font-weight: 700; color: #3d2b0e; margin-bottom: 10px; }
  .reflection-box ol { padding-left: 1.2rem; }
  .reflection-box li { font-size: 13px; color: #4a3820; line-height: 1.6; margin-bottom: 5px; }
  .restart-btn {
    display: inline-block; padding: 11px 28px; background: #fffdf7;
    border: 1.5px solid #c9b99a; border-radius: 10px; font-size: 14px;
    font-weight: 700; cursor: pointer; color: #3d2b0e; font-family: Georgia, serif;
    transition: background 0.15s;
  }
  .restart-btn:hover { background: #f5efe0; }

  .intro-card {
    background: #fffdf7; border: 1.5px solid #c9b99a; border-radius: 12px;
    padding: 1.5rem; margin-bottom: 1.25rem; text-align: center;
  }
  .intro-card h2 { font-size: 18px; font-weight: 700; color: #3d2b0e; margin-bottom: 0.75rem; }
  .intro-card p { font-size: 14px; color: #4a3820; line-height: 1.7; margin-bottom: 0.5rem; }
  .intro-card .stat-start { display: flex; justify-content: center; gap: 20px; margin: 1rem 0; font-family: Arial, sans-serif; font-size: 13px; color: #7a6040; }
  .intro-card .stat-start span { background: #f0e8d8; padding: 4px 12px; border-radius: 100px; }
  .start-btn {
    display: inline-block; padding: 12px 32px; background: #3d2b0e;
    color: #f5efe0; border: none; border-radius: 10px; font-size: 15px;
    font-weight: 700; cursor: pointer; font-family: Georgia, serif;
    transition: background 0.15s; margin-top: 0.5rem;
  }
  .start-btn:hover { background: #5a4020; }

  @media (max-width: 500px) {
    .choices-grid { grid-template-columns: 1fr; }
    .stats-bar { gap: 6px; }
    .stat-value { font-size: 22px; }
  }
</style>
</head>
<body>
<div id="game">
  <div class="game-header">
    <h1>The Oregon Trail</h1>
    <p class="subtitle">A colony survival game &mdash; 1843</p>
  </div>
  <div id="screen"></div>
</div>

<script>
const SCENARIOS = [
  {
    phase: "Setting Out — May 1843",
    title: "Which trail do you take?",
    desc: "Your wagon party stands at Independence, Missouri. Two routes stretch westward. This first decision sets the tone for everything ahead.",
    choices: [
      {
        label: "Follow the main Oregon Trail",
        desc: "Well-traveled but crowded. Competition for grass, water, and campsites.",
        effects: { food: -1, health: 0, morale: +2 },
        result: "The main trail is packed with other wagons. You wait hours at every river crossing and the grass near camp is grazed to mud. But the company keeps spirits high.",
        resultEffects: { food: -1, morale: +2 }
      },
      {
        label: "Take the Sublette Cutoff",
        desc: "Saves 85 miles but crosses 50 dry miles with no water or shade.",
        effects: { food: +2, health: -3, morale: -1 },
        result: "Two days without water. A child nearly dies. Three adults develop fevers that linger for weeks. You are ahead of schedule — but your people are paying for it.",
        resultEffects: { food: +2, health: -3, morale: -1 }
      }
    ]
  },
  {
    phase: "On the Trail — Late May 1843",
    title: "Your water supply is contaminated",
    desc: "You discover your water barrels have gone bad — likely from a stagnant source two days back. You are a day from the next river. What do you do?",
    choices: [
      {
        label: "Ration what clean water remains and push hard",
        desc: "Get to the river fast. Everyone goes thirsty for a day.",
        effects: { food: 0, health: -2, morale: -1 },
        result: "The push is miserable. Two elderly members of the party collapse from heat and dehydration. You reach the river by nightfall. Everyone drinks deeply. But the damage is done.",
        resultEffects: { health: -2, morale: -1 }
      },
      {
        label: "Boil and reuse what you have, slow the pace",
        desc: "Safer, but you lose a full day and burn extra food cooking.",
        effects: { food: -2, health: -1, morale: 0 },
        result: "The boiling process is slow and exhausting. You lose a day of travel. The water tastes terrible but nobody gets seriously sick. You arrive at the river a day behind schedule.",
        resultEffects: { food: -2, health: -1 }
      }
    ]
  },
  {
    phase: "On the Trail — June 1843",
    title: "The river is flooding",
    desc: "You reach the Kansas River crossing. It is running fast and deep from spring rains. The ferryman wants $3 per wagon — nearly all your remaining cash.",
    choices: [
      {
        label: "Pay the ferryman",
        desc: "Safe crossing, but the money was earmarked for supplies at Fort Laramie.",
        effects: { food: -2, health: +1, morale: 0 },
        result: "The ferry crossing is smooth. But that money was going to buy medicine and extra flour. You arrive at the next fort with far less to spend than you hoped.",
        resultEffects: { food: -2, health: +1 }
      },
      {
        label: "Ford it yourself",
        desc: "Save the money, risk the river.",
        effects: { food: +1, health: -3, morale: -2 },
        result: "Your lead wagon tips sideways. Supplies soak. Two people are swept downstream — both pulled out, one with a broken arm. The party is badly shaken. Several never trust your judgment again.",
        resultEffects: { health: -3, food: +1, morale: -2 }
      }
    ]
  },
  {
    phase: "On the Trail — June 1843",
    title: "Someone has cholera",
    desc: "A member of your party shows unmistakable signs of cholera. It killed entire wagon trains in 1850. Every hour matters. What do you do?",
    choices: [
      {
        label: "Quarantine the sick immediately",
        desc: "Separate them from the group. Hard, but it may save everyone else.",
        effects: { food: 0, health: +2, morale: -3 },
        result: "The quarantine holds. The sick person survives — barely. But separating a mother from her children, a husband from his wife, breaks something in the party that doesn't fully heal.",
        resultEffects: { health: +2, morale: -3 }
      },
      {
        label: "Keep the group together and nurse everyone",
        desc: "Compassionate, but cholera spreads fast in close quarters.",
        effects: { food: -1, health: -3, morale: +1 },
        result: "Three more people catch it within two days. You lose a week camped by the trail. One person dies. The grief is heavy, but the survivors are bound to each other in a way that only loss creates.",
        resultEffects: { food: -1, health: -3, morale: +1 }
      }
    ]
  },
  {
    phase: "Fort Laramie — July 1843",
    title: "Resupply at Fort Laramie",
    desc: "Fort Laramie is your last major resupply point before the mountains. Prices are steep and your funds are limited. Every dollar counts.",
    choices: [
      {
        label: "Buy food, medicine, and spare axle parts",
        desc: "Spend heavily on practical supplies for the hard miles ahead.",
        effects: { food: +3, health: +2, morale: -1 },
        result: "You leave Fort Laramie well-stocked but nearly broke. The party is anxious about money. But you have what you need to survive the mountains — probably.",
        resultEffects: { food: +3, health: +2, morale: -1 }
      },
      {
        label: "Save most of the money, buy only bare essentials",
        desc: "Gamble on hunting and foraging through the Rockies.",
        effects: { food: -2, health: 0, morale: +2 },
        result: "The party feels bold leaving the fort light and fast. Game is decent for the first week. Then you hit the high passes and the animals disappear. You are pushing into the worst terrain of the trail with thin supplies.",
        resultEffects: { food: -2, morale: +2 }
      }
    ]
  },
  {
    phase: "Rocky Mountains — July 1843",
    title: "A wagon breaks down",
    desc: "One of your party's wagons loses a wheel on a rocky stretch. Fixing it properly will take two days. A rough patch job might hold — or might fail at the worst moment.",
    choices: [
      {
        label: "Make a proper repair — take the two days",
        desc: "Do it right. Lose the time.",
        effects: { food: -2, health: +1, morale: 0 },
        result: "The repair is solid. The wagon carries the family safely the rest of the way. But two days idle in the mountains eats into your supplies and puts you behind the safest weather window.",
        resultEffects: { food: -2, health: +1 }
      },
      {
        label: "Patch it and keep moving",
        desc: "Save the time. Risk the wheel.",
        effects: { food: 0, health: -2, morale: -1 },
        result: "The patch holds for four days. Then the wheel gives out again — this time on a downhill slope. The wagon lurches. No one dies, but injuries put two people out of commission for a week.",
        resultEffects: { health: -2, morale: -1 }
      }
    ]
  },
  {
    phase: "Rocky Mountains — August 1843",
    title: "The mountain pass is snowing",
    desc: "It is only August, but an early snowstorm is closing the South Pass. Push through in dangerous conditions, or wait and risk the window closing entirely?",
    choices: [
      {
        label: "Push through immediately",
        desc: "Risk the storm to guarantee the crossing.",
        effects: { food: -2, health: -3, morale: +1 },
        result: "The storm catches you mid-pass. An ox dies. Two people suffer frostbite bad enough to lose toes. The descent takes three days instead of one. You are through — but the cost was severe.",
        resultEffects: { food: -2, health: -3, morale: +1 }
      },
      {
        label: "Wait three days and hope it clears",
        desc: "Rest the party, conserve strength — but supplies drain sitting idle.",
        effects: { food: -3, health: +1, morale: -1 },
        result: "The storm clears on day four, not three. You have burned through more food than planned just surviving the wait. The crossing is hard but doable. You are alive and intact — and running very low on food.",
        resultEffects: { food: -3, health: +1, morale: -1 }
      }
    ]
  },
  {
    phase: "Rocky Mountains — August 1843",
    title: "Your lead ox is lame",
    desc: "Your strongest ox has gone lame on the steepest section of the trail. Without a full team, your wagon cannot make the grade. Something must give.",
    choices: [
      {
        label: "Abandon heavy supplies to lighten the load",
        desc: "Leave the iron stove, extra furniture, and heavy tools by the trail.",
        effects: { food: -1, health: 0, morale: -3 },
        result: "You add your family's possessions to the long graveyard of abandoned dreams along the trail. The wagon moves. But what you left behind was irreplaceable — and everyone knows it.",
        resultEffects: { food: -1, morale: -3 }
      },
      {
        label: "Combine with another family's team to pull both wagons up",
        desc: "Cooperative but slow. Doubles the strain on the remaining oxen.",
        effects: { food: -2, health: -1, morale: +1 },
        result: "The combined team struggles badly. One more ox goes lame by the top. You make the grade — barely — but your animals are in poor shape for the miles still ahead.",
        resultEffects: { food: -2, health: -1, morale: +1 }
      }
    ]
  },
  {
    phase: "Snake River — September 1843",
    title: "You meet a group of Cayuse people",
    desc: "A group of Cayuse people approach your camp near the Snake River. They offer to trade food and guide your party through a difficult river section. How do you respond?",
    choices: [
      {
        label: "Trade and accept their guidance",
        desc: "Build goodwill and get desperately needed help.",
        effects: { food: +3, health: +1, morale: +2 },
        result: "The Cayuse guides know every crossing intimately. They lead you through a section that has drowned two wagon parties this season. You cross safely and your food stores grow. This was the right call.",
        resultEffects: { food: +3, health: +1, morale: +2 }
      },
      {
        label: "Refuse contact and post armed guards",
        desc: "Distrust and fear drive the decision.",
        effects: { food: -1, health: 0, morale: -2 },
        result: "You ford the river without guidance and lose a supply wagon in a crossing that could have been avoided. The tension in camp from your fearful decision lingers for days. The Cayuse watch you struggle from the bank and move on.",
        resultEffects: { food: -1, morale: -2 }
      }
    ]
  },
  {
    phase: "Snake River — September 1843",
    title: "Food is running critically low",
    desc: "Your food supplies are dangerously thin. You are three weeks from the Willamette Valley. A hunting party could go out, but it means splitting the group in unfamiliar territory.",
    choices: [
      {
        label: "Send out a hunting party for three days",
        desc: "Risk splitting the group. Hope for game.",
        effects: { food: +2, health: -1, morale: 0 },
        result: "The hunters bring back two deer and a dozen rabbits — not enough, but better than nothing. One hunter twists an ankle badly in rocky terrain. You push forward with slightly more food and one fewer able body.",
        resultEffects: { food: +2, health: -1 }
      },
      {
        label: "Ration strictly and keep the group together",
        desc: "Everyone goes hungry, but nobody gets separated.",
        effects: { food: -1, health: -2, morale: -2 },
        result: "Two weeks of half rations takes a serious toll. Three people develop symptoms of malnutrition. Morale collapses as hunger makes every small conflict feel enormous. You push forward, but the group is fraying.",
        resultEffects: { food: -1, health: -2, morale: -2 }
      }
    ]
  },
  {
    phase: "Blue Mountains — September 1843",
    title: "A member of the party wants to turn back",
    desc: "One of the fathers in your group — exhausted, grieving a lost ox, watching his children go hungry — announces he is taking his family back east. Three other families are wavering.",
    choices: [
      {
        label: "Let them go and hold a group meeting to recommit",
        desc: "Respect his choice. Rebuild the remaining group's resolve.",
        effects: { food: +1, health: 0, morale: -2 },
        result: "The family turns back. You will never know if they made it. The group meeting is hard, but the people who remain choose the trail with clear eyes. Fewer mouths to feed helps the supplies stretch.",
        resultEffects: { food: +1, morale: -2 }
      },
      {
        label: "Convince them to stay — the valley is close",
        desc: "Rally everyone with optimism. It had better be justified.",
        effects: { food: -3, health: 0, morale: +2 },
        result: "Your words hold the group together. The father stays. Two hard weeks later, when the valley comes into view, he grips your arm and says nothing. He doesn't need to.",
        resultEffects: { morale: +2 }
      }
    ]
  },
  {
    phase: "The Willamette Valley — October 1843",
    title: "Conflict over land claims",
    desc: "You have arrived — but two families are in bitter conflict over the best farmland. The argument threatens to split the settlement before it even begins.",
    choices: [
      {
        label: "Force a binding vote, majority rules",
        desc: "Fast and democratic — but the losers will carry resentment into winter.",
        effects: { food: 0, health: 0, morale: -2 },
        result: "The vote splits 7 to 3. The losing family hasn't spoken to the others in a week. You got a decision — but you may have planted the seed of a feud that outlasts the winter.",
        resultEffects: { morale: -2 }
      },
      {
        label: "Mediate: survey the land and divide it fairly",
        desc: "Time-consuming. Requires trust. But everyone feels heard.",
        effects: { food: -1, health: 0, morale: +2 },
        result: "The survey takes three days you couldn't spare. But when it's done, both families sign the agreement and shake hands. The community starts on solid ground. That is worth more than three days.",
        resultEffects: { food: -1, morale: +2 }
      }
    ]
  },
  {
    phase: "The Willamette Valley — October 1843",
    title: "Winter is two weeks away",
    desc: "There is not enough time to do everything before the first frost. You must choose what to prioritize.",
    choices: [
      {
        label: "Build solid shelters for every family",
        desc: "Warm and weatherproof going into winter. Food will have to stretch.",
        effects: { food: -2, health: +3, morale: +1 },
        result: "The cabins are rough but tight. The first hard frost comes nine days later. Everyone is under a roof. The food is short, but no one freezes. The decision was right.",
        resultEffects: { health: +3, food: -2, morale: +1 }
      },
      {
        label: "Focus on storing and preserving every scrap of food",
        desc: "Full root cellar. Half-built shelters. A dangerous gamble.",
        effects: { food: +3, health: -3, morale: -1 },
        result: "The root cellar is well-stocked. The shelters are not finished when the freeze comes. Three people develop serious lung sickness sleeping in half-built structures. Two of them do not recover fully. The food remains. Not everyone does.",
        resultEffects: { food: +3, health: -3, morale: -1 }
      }
    ]
  },
  {
    phase: "First Winter — January 1844",
    title: "A neighboring party is starving",
    desc: "A scout reports another settler family camped two miles away — completely out of food. They have five children. They are asking to share your stores.",
    choices: [
      {
        label: "Share what you can spare",
        desc: "Reduce your own stores. Build your community.",
        effects: { food: -3, health: 0, morale: +3 },
        result: "You give them enough to survive. Word spreads through the valley. When spring planting comes, four families show up to help break your fields. What you gave came back multiplied.",
        resultEffects: { food: -3, morale: +3 }
      },
      {
        label: "Turn them away — you cannot risk your own people",
        desc: "Protect what you have. Live with the choice.",
        effects: { food: +1, health: 0, morale: -4 },
        result: "Two of those children do not survive the winter. You did not cause it — not directly. But three members of your own party leave the settlement in spring, unable to stay. The colony is quieter, smaller, and shadowed.",
        resultEffects: { food: +1, morale: -4 }
      }
    ]
  },
  {
    phase: "Spring — April 1844",
    title: "The first crops go in the ground",
    desc: "You have survived the winter. Now the real work begins. How you plant determines whether next winter is better or worse.",
    choices: [
      {
        label: "Plant a wide variety of crops for safety",
        desc: "Lower yield per crop, but if one fails you have others.",
        effects: { food: +2, health: +1, morale: +1 },
        result: "The variety saves you when a late frost kills half the wheat. The root vegetables and beans come through. It is not a feast, but it is enough. The colony will make it.",
        resultEffects: { food: +2, health: +1, morale: +1 }
      },
      {
        label: "Plant all wheat — highest yield if it succeeds",
        desc: "Bet everything on one crop. High reward, catastrophic if it fails.",
        effects: { food: +4, health: 0, morale: +2 },
        result: "The weather is perfect and the wheat comes in strong. Your stores for next winter are the fullest they have ever been. You got lucky — and you know it.",
        resultEffects: { food: +4, morale: +2 }
      }
    ]
  }
];

const MAX_STAT = 20;
const SCENARIO_COUNT = SCENARIOS.length;

let state = { food: 10, health: 10, morale: 10 };
let currentIdx = 0;
let choiceResult = null;
let gameOver = false;
let started = false;

function clamp(v) { return Math.max(0, Math.min(MAX_STAT, v)); }
function statColor(v) { return v <= 2 ? 'danger' : v <= 4 ? 'warn' : 'ok'; }
function barColor(v) { return v <= 2 ? '#b83030' : v <= 4 ? '#a06010' : '#5a7a35'; }
function pct(v) { return Math.round((v / MAX_STAT) * 100) + '%'; }

function renderStats(food, health, morale) {
  const critical = [], warn = [];
  if (food <= 2) critical.push('Food'); else if (food <= 4) warn.push('Food');
  if (health <= 2) critical.push('Health'); else if (health <= 4) warn.push('Health');
  if (morale <= 2) critical.push('Morale'); else if (morale <= 4) warn.push('Morale');

  let bannerHtml = '';
  if (critical.length) bannerHtml = `<div class="danger-banner">&#9888; CRITICAL: ${critical.join(' and ')} near zero — one bad choice ends the colony</div>`;
  else if (warn.length) bannerHtml = `<div class="warning-banner">&#9888; Warning: ${warn.join(' and ')} dangerously low</div>`;

  return `${bannerHtml}
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Food</div>
      <div class="stat-value ${statColor(food)}">${food}</div>
      <div class="stat-bar-fill"><div class="stat-bar-inner" style="width:${pct(food)};background:${barColor(food)}"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Health</div>
      <div class="stat-value ${statColor(health)}">${health}</div>
      <div class="stat-bar-fill"><div class="stat-bar-inner" style="width:${pct(health)};background:${barColor(health)}"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Morale</div>
      <div class="stat-value ${statColor(morale)}">${morale}</div>
      <div class="stat-bar-fill"><div class="stat-bar-inner" style="width:${pct(morale)};background:${barColor(morale)}"></div></div>
    </div>
  </div>`;
}

function renderProgress(current) {
  const p = Math.round((current / SCENARIO_COUNT) * 100);
  return `<div class="progress-wrap">
    <div class="progress-label">Scenario ${current} of ${SCENARIO_COUNT}</div>
    <div class="progress-track"><div class="progress-fill" style="width:${p}%"></div></div>
  </div>`;
}

function effectTags(effects) {
  const tags = [];
  const map = { food: 'Food', health: 'Health', morale: 'Morale' };
  for (const [k, v] of Object.entries(effects)) {
    if (v === 0) continue;
    const sign = v > 0 ? '+' : '';
    const cls = v > 0 ? 'pos' : 'neg';
    tags.push(`<span class="effect-tag ${cls}">${sign}${v} ${map[k]}</span>`);
  }
  if (!tags.length) tags.push('<span class="effect-tag neu">no stat change</span>');
  return tags.join('');
}

function deltaTags(effects) {
  const tags = [];
  const map = { food: 'Food', health: 'Health', morale: 'Morale' };
  for (const [k, v] of Object.entries(effects)) {
    if (!v) continue;
    const sign = v > 0 ? '+' : '';
    const cls = v > 0 ? 'pos' : 'neg';
    tags.push(`<span class="delta-tag ${cls}">${sign}${v} ${map[k]}</span>`);
  }
  if (!tags.length) tags.push('<span class="delta-tag zero">no changes</span>');
  return tags.join('');
}

function applyChoice(choice) {
  const e = choice.resultEffects || choice.effects;
  state.food   = clamp(state.food   + (e.food   || 0));
  state.health = clamp(state.health + (e.health || 0));
  state.morale = clamp(state.morale + (e.morale || 0));
  choiceResult = choice;
  if (state.food === 0 || state.health === 0 || state.morale === 0) gameOver = true;
}

function render() {
  const screen = document.getElementById('screen');

  if (!started) {
    screen.innerHTML = `
      <div class="intro-card">
        <h2>Welcome, Settler</h2>
        <p>It is 1843. Your wagon party is about to attempt the 2,000-mile Oregon Trail. The journey will take five months and test every decision you make as a group.</p>
        <p>Track three stats. If any one of them reaches zero, your colony fails.</p>
        <div class="stat-start">
          <span>Food: 10</span>
          <span>Health: 10</span>
          <span>Morale: 10</span>
        </div>
        <p>You will face 15 scenarios. Choose carefully — the trail does not forgive mistakes.</p>
        <button class="start-btn" onclick="startGame()">Begin the Journey</button>
      </div>
    `;
    return;
  }

  if (gameOver || currentIdx >= SCENARIO_COUNT) { renderEnd(screen); return; }

  const scenario = SCENARIOS[currentIdx];

  if (choiceResult) {
    const e = choiceResult.resultEffects || choiceResult.effects;
    screen.innerHTML = `
      ${renderProgress(currentIdx)}
      ${renderStats(state.food, state.health, state.morale)}
      <div class="result-box">
        <div class="result-chosen">Your choice</div>
        <div class="result-title">${choiceResult.label}</div>
        <div class="result-desc">${choiceResult.result}</div>
        <div class="delta-row">${deltaTags(e)}</div>
      </div>
      <button class="next-btn" onclick="nextScenario()">Continue the journey &rarr;</button>
    `;
  } else {
    const btns = scenario.choices.map((c, i) => `
      <button class="choice-btn" onclick="makeChoice(${i})">
        <div class="choice-title">${c.label}</div>
        <div class="choice-desc">${c.desc}</div>
        <div class="effect-row">${effectTags(c.effects)}</div>
      </button>
    `).join('');

    screen.innerHTML = `
      ${renderProgress(currentIdx + 1)}
      ${renderStats(state.food, state.health, state.morale)}
      <hr class="divider">
      <div class="phase-banner">${scenario.phase}</div>
      <div class="scenario-title">${scenario.title}</div>
      <div class="scenario-desc">${scenario.desc}</div>
      <div class="choices-grid">${btns}</div>
    `;
  }
}

function renderEnd(screen) {
  const survived = state.food > 0 && state.health > 0 && state.morale > 0;
  const total = state.food + state.health + state.morale;

  let title, sub;
  if (!survived) {
    const failed = [];
    if (state.food === 0) failed.push('food');
    if (state.health === 0) failed.push('health');
    if (state.morale === 0) failed.push('morale');
    title = 'The colony did not survive.';
    sub = `Your ${failed.join(' and ')} reached zero. The trail claimed your wagon party. This happened to real families — thousands set out, and not all arrived. What would your group do differently?`;
  } else if (total >= 45) {
    title = 'A thriving settlement!';
    sub = `Your colony arrived in excellent shape — well-fed, healthy, and united. You made some exceptional decisions under pressure. Final score: ${total} / 60`;
  } else if (total >= 33) {
    title = 'Your colony survived.';
    sub = `You made it to the Willamette Valley battered but intact. A new life begins, built on hard choices and harder miles. Final score: ${total} / 60`;
  } else {
    title = 'Your colony survived — barely.';
    sub = `You are alive. The losses were real, the winter was brutal, and the margin was razor-thin. You made it — but not everyone who started with you finished. Final score: ${total} / 60`;
  }

  screen.innerHTML = `
    <div class="end-card">
      <div class="end-result-banner ${survived ? 'survived' : 'failed'}">${survived ? 'Spring 1844 &mdash; You Made It' : 'The Colony Failed'}</div>
      <div class="end-title">${title}</div>
      <div class="end-sub">${sub}</div>
      <div class="final-stats">
        <div class="stat-card">
          <div class="stat-label">Final Food</div>
          <div class="stat-value ${statColor(state.food)}">${state.food}</div>
          <div class="stat-bar-fill"><div class="stat-bar-inner" style="width:${pct(state.food)};background:${barColor(state.food)}"></div></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Final Health</div>
          <div class="stat-value ${statColor(state.health)}">${state.health}</div>
          <div class="stat-bar-fill"><div class="stat-bar-inner" style="width:${pct(state.health)};background:${barColor(state.health)}"></div></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Final Morale</div>
          <div class="stat-value ${statColor(state.morale)}">${state.morale}</div>
          <div class="stat-bar-fill"><div class="stat-bar-inner" style="width:${pct(state.morale)};background:${barColor(state.morale)}"></div></div>
        </div>
      </div>
      <div class="reflection-box">
        <h3>Group Reflection Questions</h3>
        <ol>
          <li>What was your single best decision? Why?</li>
          <li>Which choice hurt you most — were you surprised by the consequence?</li>
          <li>Which stat was hardest to keep up, and why do you think that is?</li>
          <li>Real Oregon Trail travelers faced these exact tradeoffs. What does that tell you about why westward expansion was so difficult?</li>
          <li>If you played again, what would you do differently from the very first decision?</li>
        </ol>
      </div>
      <button class="restart-btn" onclick="restartGame()">Play Again</button>
    </div>
  `;
}

function startGame() { started = true; render(); }
function makeChoice(idx) { applyChoice(SCENARIOS[currentIdx].choices[idx]); render(); }
function nextScenario() { choiceResult = null; currentIdx++; render(); }
function restartGame() {
  state = { food: 10, health: 10, morale: 10 };
  currentIdx = 0; choiceResult = null; gameOver = false; started = false;
  render();
}

render();
</script>
</body>
</html>
